global:
  imagePullSecrets:
    - regcred
  runtimeSecretName: agent-control-plane-secrets

nameOverride: agent-control-plane
fullnameOverride: agent-control-plane

replicaCount: 1

image:
  repository: registry.digitalocean.com/sendouq/agent-platform
  tag: sha-d3fcbde11a77
  pullPolicy: IfNotPresent

secretKeys:
  - AGENT_PLATFORM_DATABASE_URL
  - AGENT_PLATFORM_OPENCLAW_TOKEN
  - AGENT_PLATFORM_INTERNAL_WORKER_TOKEN
  - AGENT_PLATFORM_WORKER_SERVICE_TOKEN
  - AGENT_PLATFORM_APPROVAL_TOKEN
  - AGENT_PLATFORM_AUDIT_READ_TOKEN
  - AGENT_PLATFORM_AUDIT_WRITE_TOKEN
  - AGENT_PLATFORM_READONLY_SQL_DATABASE_URL
  - AGENT_PLATFORM_MODEL_GATEWAY_TOKEN_SECRET
  - AGENT_PLATFORM_MODEL_GATEWAY_CODEX_AUTH_JSON
  - AGENT_PLATFORM_WORKLOAD_IDENTITY_HMAC_SECRET

env:
  AGENT_PLATFORM_ENVIRONMENT: prod
  AGENT_PLATFORM_POSTGRES_POOL_MIN_SIZE: "0"
  AGENT_PLATFORM_POSTGRES_POOL_MAX_SIZE: "2"
  AGENT_PLATFORM_READONLY_SQL_POOL_MIN_SIZE: "0"
  AGENT_PLATFORM_READONLY_SQL_POOL_MAX_SIZE: "1"
  AGENT_PLATFORM_MODEL_GATEWAY_BACKEND: codex_chatgpt_responses
  AGENT_PLATFORM_MODEL_GATEWAY_TIMEOUT_SECONDS: "90"
  AGENT_PLATFORM_WORKLOAD_IDENTITY_MODE: hmac
  AGENT_PLATFORM_WORKLOAD_IDENTITY_ISSUER: kubernetes
  AGENT_PLATFORM_WORKLOAD_IDENTITY_AUDIENCE: mandate-api
  AGENT_PLATFORM_WORKLOAD_IDENTITY_REQUIRED_SCOPES: worker_service
  AGENT_PLATFORM_WORKLOAD_IDENTITY_ALLOWED_SUBJECTS_JSON: '{"worker_service":["data.workspace_probe","opencode.proposer"]}'
  AGENT_PLATFORM_HOSTED_HARNESS_SAFE_FLOOR_EVIDENCE: deployment_attestation
  AGENT_PLATFORM_HOSTED_HARNESS_SAFE_FLOOR_EGRESS_JAIL: "true"
  AGENT_PLATFORM_HOSTED_HARNESS_SAFE_FLOOR_NO_AMBIENT_CREDENTIALS: "true"
  AGENT_PLATFORM_HOSTED_HARNESS_SAFE_FLOOR_MODEL_GATEWAY: "true"
  AGENT_PLATFORM_HOSTED_HARNESS_SAFE_FLOOR_COST_CUTOFF: "true"
  AGENT_PLATFORM_HOSTED_HARNESS_SAFE_FLOOR_CONSEQUENCE_ENFORCEMENT: "true"
  AGENT_PLATFORM_HOSTED_HARNESS_SAFE_FLOOR_AUDIT: "true"

migrations:
  enabled: true
  useHelmHooks: true
  disableStartupSchemaMigration: true

localWorker:
  enabled: true
  replicaCount: 1
  capabilities: task.echo,approval.probe,readonly_sql,audit.digest,mandate.ops.inspect,mandate.deploy.smoke
  pollSeconds: 2
  batchSize: 1

callbackAdapter:
  enabled: true
  replicaCount: 1
  sink: http
  secretKeys:
    - AGENT_PLATFORM_OPENCLAW_CALLBACK_URL
    - AGENT_PLATFORM_OPENCLAW_CALLBACK_TOKEN
    - AGENT_PLATFORM_DISCORD_BOT_TOKEN
  pollSeconds: 2
  batchSize: 10
  leaseSeconds: 60
  discordThreads:
    enabled: true
    autoArchiveMinutes: 1440

modelGateway:
  enabled: true
  replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - agent-control-plane.garz.ai
  tls:
    enabled: true
    secretName: agent-control-plane-tls
    certificate:
      enabled: true
      issuerName: letsencrypt-prod
      dnsNames: []

networkPolicy:
  enabled: true
  ingress:
    sources:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ingress-nginx
        podSelector:
          matchLabels:
            app.kubernetes.io/name: ingress-nginx
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: agent-workloads
        podSelector:
          matchLabels:
            app.kubernetes.io/name: agent-workloads
            app.kubernetes.io/instance: agent-workloads
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: agent-workloads
        podSelector:
          matchLabels:
            app.kubernetes.io/name: opencode-proposer
            app.kubernetes.io/instance: agent-workloads
    ports:
      - port: 8000
        protocol: TCP
  egress:
    dns:
      enabled: true
      destinations:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    destinations:
      - ipBlock:
          cidr: 10.108.0.0/20
        ports:
          - port: 25060
            protocol: TCP
      - ipBlock:
          cidr: 0.0.0.0/0
        ports:
          - port: 443
            protocol: TCP

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
