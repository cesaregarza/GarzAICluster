global:
  imagePullSecrets:
    - regcred
  runtimeSecretName: agent-control-plane-secrets

replicaCount: 1

image:
  repository: registry.digitalocean.com/sendouq/agent-platform
  tag: sha-fa8c357d9d4f
  pullPolicy: IfNotPresent

secretKeys:
  - AGENT_PLATFORM_OPENCLAW_TOKEN
  - AGENT_PLATFORM_INTERNAL_WORKER_TOKEN
  - AGENT_PLATFORM_APPROVAL_TOKEN
  - AGENT_PLATFORM_AUDIT_READ_TOKEN
  - AGENT_PLATFORM_AUDIT_WRITE_TOKEN

env:
  AGENT_PLATFORM_ENVIRONMENT: prod

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - agent-control-plane.garz.ai
  tls:
    enabled: true
    secretName: agent-control-plane-tls
    certificate:
      enabled: true
      issuerName: letsencrypt-prod
      dnsNames: []

networkPolicy:
  enabled: true
  ingress:
    sources:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ingress-nginx
        podSelector:
          matchLabels:
            app.kubernetes.io/name: ingress-nginx
    ports:
      - port: 8000
        protocol: TCP
  egress:
    dns:
      enabled: true
      destinations:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    destinations: []

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
