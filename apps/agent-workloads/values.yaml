global:
  imagePullSecrets:
  - regcred
  runtimeSecretName: agent-workloads-secrets
nameOverride: agent-workloads
fullnameOverride: agent-workloads
replicaCount: 1
image:
  repository: registry.digitalocean.com/sendouq/agent-workloads-worker
  tag: sha-3f5bfda1bf4e
  digest: sha256:2b8f3b393da92a9c28eab241809ea517916ee59fc7117e10fd12bee62988ef45
  pullPolicy: IfNotPresent
env:
  MANDATE_WORKER_BASE_URL: http://agent-control-plane.agent-control-plane.svc.cluster.local
  AGENT_WORKLOADS_WORKER_ID: data.workspace_probe
  AGENT_WORKLOADS_WORKER_CAPABILITIES: agent_workloads.db_probe,agent_workloads.readonly_query
  MANDATE_WORKLOAD_IDENTITY_TOKEN_FILE: /var/run/mandate/workload-identity/token
  AGENT_WORKLOADS_ENVIRONMENT: production
  AGENT_WORKLOADS_SCHEMA: agent_workloads
  AGENT_WORKLOADS_POLL_SECONDS: '2'
  AGENT_WORKLOADS_READONLY_QUERY_MAX_PASSES: '3'
  AGENT_WORKLOADS_READONLY_QUERY_MAX_ROWS: '50'
  AGENT_WORKLOADS_READONLY_QUERY_CONNECT_TIMEOUT_SECONDS: '5'
  OPENAI_SQL_BROKER_MODEL: gpt-5.3-codex-spark
  OPENAI_SQL_BROKER_REASONING_EFFORT: low
  OPENAI_SQL_BROKER_TIMEOUT_SECONDS: '45'
secretKeys:
- AGENT_WORKLOADS_DATABASE_URL
- XSCRAPER_READONLY_DATABASE_URL
secretEnv: {}
extraVolumes:
- name: workload-identity-token
  secret:
    secretName: agent-workloads-secrets
    items:
    - key: DATA_WORKSPACE_PROBE_WORKLOAD_IDENTITY_TOKEN
      path: token
extraVolumeMounts:
- name: workload-identity-token
  mountPath: /var/run/mandate/workload-identity
  readOnly: true
resources:
  requests:
    cpu: 25m
    memory: 96Mi
  limits:
    cpu: 250m
    memory: 256Mi
networkPolicy:
  enabled: true
  egress:
    dns:
      enabled: true
      destinations:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
        podSelector:
          matchLabels:
            k8s-app: kube-dns
      ports:
      - port: 53
        protocol: UDP
      - port: 53
        protocol: TCP
    destinations:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: agent-control-plane
      podSelector:
        matchLabels:
          app.kubernetes.io/name: agent-control-plane
          app.kubernetes.io/instance: agent-control-plane
          app.kubernetes.io/component: api
      ports:
      - port: 80
        protocol: TCP
      - port: 8000
        protocol: TCP
    - ipBlock:
        cidr: 10.108.0.0/20
      ports:
      - port: 25060
        protocol: TCP
    - ipBlock:
        cidr: 159.203.109.0/32
      ports:
      - port: 25060
        protocol: TCP
workspaceSeedBundle:
  base64: 
opencodeProposer:
  enabled: true
  replicaCount: 1
  image:
    repository: registry.digitalocean.com/sendouq/opencode-proposer
    tag: sha-3f5bfda1bf4e
    digest: sha256:ce96b06816c47af51ee943e6db15adec1dde02ac7bb1d9632e047cf6f708d8d3
    pullPolicy: IfNotPresent
  secretEnv:
    MANDATE_WORKLOAD_IDENTITY_TOKEN: OPENCODE_PROPOSER_WORKLOAD_IDENTITY_TOKEN
  env:
    MANDATE_WORKER_BASE_URL: http://agent-control-plane.agent-control-plane.svc.cluster.local
    MANDATE_MODEL_GATEWAY_BASE_URL: http://agent-control-plane-model-gateway.agent-control-plane.svc.cluster.local/v1
    AGENT_WORKLOADS_WORKER_ID: opencode.proposer
    AGENT_WORKLOADS_WORKER_CAPABILITIES: agent_workloads.opencode_propose,agent_workloads.opencode_task
    AGENT_WORKLOADS_POLL_SECONDS: '2'
    AGENT_WORKLOADS_ENVIRONMENT: production
    AGENT_WORKLOADS_OPENCODE_WORKSPACE_DIR: /workspace/job
    AGENT_WORKLOADS_OPENCODE_PROPOSALS_DIR: /workspace/proposals
    AGENT_WORKLOADS_OPENCODE_WORKSPACE_SEED_PATH: /workspace/seed/workspace-seed.json
    AGENT_WORKLOADS_OPENCODE_TIMEOUT_SECONDS: '600'
  initWorkspace:
    enabled: true
    command:
    - /bin/sh
    - -c
    script: |
      set -eu
      pin="d2e2cbef3a3130a6acaf7e794a63d50793167777"
      find /workspace/job -mindepth 1 -delete
      git clone /seed-bundle/sandbox.bundle /workspace/job
      cd /workspace/job
      git config --global --add safe.directory /workspace/job
      git checkout -B main "$pin"
      git remote remove origin
      git config --local user.email mandate-opencode@garz.ai
      git config --local user.name "Mandate OpenCode"
      head="$(git rev-parse --verify HEAD)"
      test "$head" = "$pin"
      tree="$(git rev-parse --verify 'HEAD^{tree}')"
      mkdir -p /workspace/proposals
      printf '{"schema_version":"agent_workloads_opencode_workspace_seed_v1","base_repo":"https://github.com/cesaregarza/mandate-sandbox","base_ref_name":"main","base_commit_sha":"%s","base_tree_sha":"%s"}\n' "$head" "$tree" > /workspace/seed/workspace-seed.json
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: '1'
      memory: 1Gi
  networkPolicy:
    enabled: true
    egress:
      dns:
        enabled: true
        destinations:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
        ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      destinations:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: agent-control-plane
        podSelector:
          matchLabels:
            app.kubernetes.io/name: agent-control-plane
            app.kubernetes.io/instance: agent-control-plane
        ports:
        - port: 80
          protocol: TCP
        - port: 8000
          protocol: TCP
opencodeApplyExecutor:
  enabled: true
  image:
    repository: registry.digitalocean.com/sendouq/opencode-apply-executor
    tag: sha-3f5bfda1bf4e
    digest: sha256:b344a8a28ea91b6fa65dcb3877f81dbc346caff1ac65ec58a5f8f1f2f7f5f10f
    pullPolicy: IfNotPresent
  secretEnv:
    MANDATE_WORKLOAD_IDENTITY_TOKEN: OPENCODE_APPLY_EXECUTOR_WORKLOAD_IDENTITY_TOKEN
  env:
    MANDATE_WORKER_BASE_URL: http://agent-control-plane.agent-control-plane.svc.cluster.local
    AGENT_WORKLOADS_WORKER_ID: opencode.apply_executor
    AGENT_WORKLOADS_WORKER_CAPABILITIES: agent_workloads.opencode_apply
    AGENT_WORKLOADS_POLL_SECONDS: '2'
    AGENT_WORKLOADS_ENVIRONMENT: production
    AGENT_WORKLOADS_OPENCODE_APPLY_WORKSPACE_DIR: /workspace/job
    AGENT_WORKLOADS_OPENCODE_APPLY_PROPOSALS_DIR: /workspace/proposals
    AGENT_WORKLOADS_OPENCODE_APPLY_WORKSPACE_SEED_PATH: /workspace/seed/apply-workspace-seed.json
    AGENT_WORKLOADS_OPENCODE_APPLY_DEFAULT_BRANCH: main
    HOME: /tmp
    TMPDIR: /tmp
  initWorkspace:
    enabled: true
    command:
    - /bin/sh
    - -c
    script: |
      set -eu
      pin="d2e2cbef3a3130a6acaf7e794a63d50793167777"
      find /workspace/job -mindepth 1 -delete
      git clone /seed-bundle/sandbox.bundle /workspace/job
      cd /workspace/job
      git config --global --add safe.directory /workspace/job
      git checkout -B main "$pin"
      git remote remove origin
      git config --local user.email mandate-opencode@garz.ai
      git config --local user.name "Mandate OpenCode"
      head="$(git rev-parse --verify HEAD)"
      test "$head" = "$pin"
      tree="$(git rev-parse --verify 'HEAD^{tree}')"
      mkdir -p /workspace/proposals
      printf '{"schema_version":"agent_workloads_opencode_workspace_seed_v1","base_repo":"https://github.com/cesaregarza/mandate-sandbox","base_ref_name":"main","base_commit_sha":"%s","base_tree_sha":"%s"}\n' "$head" "$tree" > /workspace/seed/apply-workspace-seed.json
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
