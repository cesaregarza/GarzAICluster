      git checkout -B main "$pin"
      git remote remove origin
      git config --local user.email mandate-opencode@garz.ai
      git config --local user.name "Mandate OpenCode"
      head="$(git rev-parse --verify HEAD)"
      test "$head" = "$pin"
      tree="$(git rev-parse --verify 'HEAD^{tree}')"
      mkdir -p /workspace/proposals
      printf '{"schema_version":"agent_workloads_opencode_workspace_seed_v1","base_repo":"https://github.com/cesaregarza/mandate-sandbox","base_ref_name":"main","base_commit_sha":"%s","base_tree_sha":"%s"}\n' "$head" "$tree" > /workspace/seed/apply-workspace-seed.json
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
