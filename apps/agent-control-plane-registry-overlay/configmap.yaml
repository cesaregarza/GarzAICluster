      },
      "loop": {
        "contract": "worker_service_v1",
        "kind": "worker_service",
        "protocol": "mandate_worker_service_pull_v1"
      },
      "schema_version": "agent-workload.v1",
      "source": {
        "path": "agents/opencode-apply-executor/agent.yaml",
