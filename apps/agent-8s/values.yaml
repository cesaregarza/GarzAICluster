# Agent-8s production overlay values.
# Keeps the chart identical while letting us pin a prod image digest.
image:
  repository: registry.digitalocean.com/sendouq/agent8s
  tag: "v1.2.0"
  # IMPORTANT: use a pinned digest, not a mutable tag
  digest: "sha256:9328d9f487ace1f0f7a5fd01a2e90d0b15c8e6938ea2c3a11e7a3fb72328728f"
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: regcred
env:
  NODE_ENV: "production"
  METRICS_PORT: "9464"
  AUTHOR_ID: "313762200286396416"
extraEnv: []
secretRefs:
  - name: bot-token
  - name: bot-db-readonly
health:
  enabled: true
  port: 9464
  portName: metrics
  livenessPath: /metrics
  readinessPath: /metrics
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop: ["ALL"]
replicaCount: 1
metrics:
  enabled: true
  portName: metrics
  port: 9464
  path: /metrics
  service:
    enabled: true
    annotations: {}
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}
ssl:
  ca:
    enabled: true
    createConfigMap: true
    configMapName: do-db-ca
    fileName: ca.crt
    mountPath: /etc/ssl/certs/do-db-ca.crt
networkPolicy:
  enabled: true
  allowDNS: true
  allowHTTPS: true
serviceAccount:
  create: true
  name: ""
  automount: false
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
pdb:
  enabled: false
  minAvailable: 0
