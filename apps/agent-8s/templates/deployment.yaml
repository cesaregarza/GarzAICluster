apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-8s.fullname" . }}
  labels: {{- include "agent-8s.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  revisionHistoryLimit: 2
  selector:
    matchLabels: {{- include "agent-8s.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "agent-8s.selectorLabels" . | nindent 8 }}
      {{- $hasAnn := or .Values.metrics.enabled .Values.ssl.ca.enabled }}
      {{- if $hasAnn }}
      annotations:
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.metrics.port }}"
        prometheus.io/path: "{{ .Values.metrics.path | default "/metrics" }}"
        {{- end }}
        {{- if .Values.ssl.ca.enabled }}
        checksum/db-ca: {{ include (print $.Template.BasePath "/db-ca-configmap.yaml") . | sha256sum }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "agent-8s.serviceAccountName" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ .name | quote }}
        {{- end }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: bot
          image: "{{- if .Values.image.repository -}}{{ .Values.image.repository }}{{- if .Values.image.digest }}@{{ .Values.image.digest }}{{- else if .Values.image.tag }}:{{ .Values.image.tag }}{{- end }}{{- end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          env:
          {{- range $k, $v := .Values.env }}
            - name: {{ $k | quote }}
              value: {{ $v | quote }}
          {{- end }}
          {{- range .Values.extraEnv }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
          {{- end }}
          {{- if .Values.ssl.ca.enabled }}
            - name: PGSSLROOTCERT
              value: {{ .Values.ssl.ca.mountPath | default "/etc/ssl/certs/do-db-ca.crt" | quote }}
            - name: PGSSLMODE
              value: "verify-full"
            - name: NODE_EXTRA_CA_CERTS
              value: {{ .Values.ssl.ca.mountPath | default "/etc/ssl/certs/do-db-ca.crt" | quote }}
          {{- end }}
          envFrom:
          {{- range .Values.secretRefs }}
            - secretRef:
                name: {{ .name }}
          {{- end }}
          ports:
            - name: {{ .Values.metrics.portName | default "metrics" }}
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- if .Values.health.enabled }}
            - name: {{ .Values.health.portName | default "http" }}
              containerPort: {{ .Values.health.port | default 8080 }}
              protocol: TCP
            {{- end }}
          {{- if .Values.health.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.health.livenessPath | default "/healthz" }}
              port: {{ .Values.health.portName | default "http" }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.health.readinessPath | default "/readyz" }}
              port: {{ .Values.health.portName | default "http" }}
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if .Values.ssl.ca.enabled }}
          volumeMounts:
            - name: db-ca
              mountPath: {{ .Values.ssl.ca.mountPath | default "/etc/ssl/certs/do-db-ca.crt" | quote }}
              subPath: {{ .Values.ssl.ca.fileName | default "ca.crt" | quote }}
              readOnly: true
          {{- end }}
      {{- if .Values.ssl.ca.enabled }}
      volumes:
        - name: db-ca
          configMap:
            name: {{ .Values.ssl.ca.configMapName | default "do-db-ca" | quote }}
      {{- end }}
