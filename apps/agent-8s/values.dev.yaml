# Agent-8s development overlay values.
# Keeps the chart identical while letting us pin a dev image digest separately.
image:
  repository: registry.digitalocean.com/sendouq/agent8s
  tag: "v1.0.1"
  digest: "sha256:126d14e00e9bd1b32cc34b0d453942f421856228a92896d12d1f12f54f495487"
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: regcred
env:
  NODE_ENV: "development"
  METRICS_PORT: "9464"
  AUTHOR_ID: "313762200286396416"
extraEnv: []
secretRefs:
  - name: bot-token
  - name: bot-db-readonly
health:
  enabled: true
  port: 9464
  portName: metrics
  livenessPath: /metrics
  readinessPath: /metrics

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop: ["ALL"]
replicaCount: 1
metrics:
  enabled: true
  portName: metrics
  port: 9464
  path: /metrics
  service:
    enabled: true
    annotations: {}
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}
networkPolicy:
  enabled: true
  allowDNS: true
  allowHTTPS: true
serviceAccount:
  create: true
  name: ""
  automount: false
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
pdb:
  enabled: false
  minAvailable: 0
