apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: splattop-bots-secrets
  namespace: argocd
spec:
  generators:
    - list:
        elementsFile:
          repo:
            url: https://github.com/cesaregarza/SplatTopConfig
            path: apps/bots.yaml
            
  template:
    metadata:
      name: 'splattop-bot-{{botName}}-secret'
    spec:
      project: splattop-bots
      source:
        repoURL: https://github.com/cesaregarza/SplatTopConfig
        targetRevision: main
        path: 'secrets/bots/{{botName}}'
      destination:
        namespace: 'splattop-bot-{{botName}}'
        server: https://kubernetes.default.svc
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true