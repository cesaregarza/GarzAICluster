apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: splattop
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: SplatTop production project (default + monitoring namespaces)

  sourceRepos:
    - https://github.com/cesaregarza/SplatTopConfig
    - https://github.com/cesaregarza/agent-platform

  destinations:
    - namespace: default
      server: https://kubernetes.default.svc
    - namespace: splatvote-prod
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: external-dns
      server: https://kubernetes.default.svc
    - namespace: vanity-hosts
      server: https://kubernetes.default.svc
    - namespace: garz-ai
      server: https://kubernetes.default.svc
    - namespace: agent-control-plane
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: cert-manager.io
      kind: Certificate
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: argoproj.io
      kind: ApplicationSet

  namespaceResourceWhitelist:
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: cilium.io
      kind: CiliumNetworkPolicy
    - group: policy
      kind: PodDisruptionBudget
    - group: cert-manager.io
      kind: Certificate
    - group: argoproj.io
      kind: ApplicationSet
    - group: argoproj.io
      kind: Application

  orphanedResources:
    warn: true
    ignore:
      - group: ''
        kind: Secret
        name: regcred
      - group: ''
        kind: Secret
        name: vote-db-secrets
      - group: ''
        kind: Secret
        name: db-secrets
      - group: ''
        kind: Secret
        name: grafana-admin-credentials
      - group: ''
        kind: Secret
        name: alertmanager-config
      - group: ''
        kind: Secret
        name: tls-secret
      - group: ''
        kind: Secret
        name: blog-db-secrets
      - group: ''
        kind: Secret
        name: teams-refresh-db-secrets
      - group: ''
        kind: Secret
        name: blog-tls-secret
      - group: ''
        kind: Secret
        name: spotify-hot-100-tls
      - group: ''
        kind: Secret
        name: grafana-tls
      - group: ''
        kind: Secret
        name: justflip-garz-ai-tls
      - group: ''
        kind: Secret
        name: agent-control-plane-secrets
      - group: ''
        kind: Secret
        name: agent-control-plane-tls
      - group: ''
        kind: ConfigMap
        name: kube-root-ca.crt

  syncWindows:
    - kind: allow
      schedule: '0 15 * * 1-5'
      duration: 11h
      manualSync: true
      applications:
        - '*'
      clusters:
        - '*'
      namespaces:
        - '*'
    - kind: allow
      schedule: '0 0 * * *'
      duration: 24h
      applications:
        - splatvote-secrets
      clusters:
        - '*'
      namespaces:
        - '*'

  roles:
    - name: admin
      description: Admin access scoped to SplatTop production
      policies:
        - p, proj:splattop:admin, applications, *, splattop/*, allow
      groups:
        - splattop-admins
