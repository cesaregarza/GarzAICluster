apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-control-plane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: splattop
  sources:
    - repoURL: git@github.com:cesaregarza/agent-platform.git
      targetRevision: 1bf9b90c6cbf01222f1a2f1560b7690aced5a811
      path: helm/mandate
      helm:
        releaseName: agent-control-plane
        valueFiles:
          - $values/apps/agent-control-plane/values.yaml
    - repoURL: https://github.com/cesaregarza/SplatTopConfig
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-control-plane
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  revisionHistoryLimit: 10
