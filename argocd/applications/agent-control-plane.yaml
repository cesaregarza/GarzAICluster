apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-control-plane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: splattop
  sources:
    - repoURL: git@github.com:cesaregarza/agent-platform.git
      targetRevision: 07fe41f704526bfe424b736b8676662ad15bbea8
      path: helm/agent-control-plane
      helm:
        releaseName: agent-control-plane
        valueFiles:
          - $values/apps/agent-control-plane/values.yaml
    - repoURL: https://github.com/cesaregarza/SplatTopConfig
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-control-plane
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  revisionHistoryLimit: 10
