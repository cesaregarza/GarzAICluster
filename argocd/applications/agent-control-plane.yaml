apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-control-plane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: splattop
  sources:
    - repoURL: git@github.com:cesaregarza/agent-platform.git
      targetRevision: 369ebe8c8f3046a5833a9e03539e79bec5e832f2
      path: helm/mandate
      helm:
        releaseName: agent-control-plane
        valueFiles:
          - $values/apps/agent-control-plane/values.yaml
    - repoURL: https://github.com/cesaregarza/GarzAICluster
      targetRevision: main
      ref: values
    - repoURL: https://github.com/cesaregarza/GarzAICluster
      targetRevision: main
      path: apps/agent-control-plane-runtime-controls
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-control-plane
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  revisionHistoryLimit: 10
