{{- if .Values.voteFrontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "splatvote.fullname" . }}-frontend-nginx
  labels:
    {{- include "splatvote.labels" . | nindent 4 }}
    app.kubernetes.io/component: vote-frontend
data:
  default.conf: |
    server {
        listen {{ .Values.voteFrontend.containerPort | default 80 }};
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        gzip_min_length 1000;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
{{- end }}
