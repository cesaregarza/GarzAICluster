{{- if .Values.voteFrontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "splatvote.fullname" . }}-frontend
  labels:
    {{- include "splatvote.labels" . | nindent 4 }}
    app.kubernetes.io/component: vote-frontend
spec:
  replicas: {{ .Values.voteFrontend.replicas }}
  selector:
    matchLabels:
      {{- include "splatvote.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vote-frontend
  template:
    metadata:
      labels:
        {{- include "splatvote.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vote-frontend
    spec:
      {{- include "splatvote.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: vote-frontend
          image: "{{ .Values.voteFrontend.image.repository }}:{{ .Values.voteFrontend.image.tag | default .Values.global.appImageTag }}"
          imagePullPolicy: {{ .Values.voteFrontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.voteFrontend.containerPort | default 80 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.voteFrontend.containerPort | default 80 }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.voteFrontend.containerPort | default 80 }}
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.voteFrontend.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "splatvote.fullname" . }}-frontend-nginx
            items:
              - key: default.conf
                path: default.conf
      securityContext:
        seccompProfile:
          type: RuntimeDefault
{{- end }}
