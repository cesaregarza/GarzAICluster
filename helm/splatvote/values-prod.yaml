# Production values for splatvote.
# Use with: helm install splatvote ./helm/splatvote -f ./helm/splatvote/values-prod.yaml

global:
  environment: production
  appImageTag: v1.0.2

# Vote API backend configuration
voteApi:
  replicas: 1
  image:
    tag: v1.0.2
    pullPolicy: IfNotPresent
  env:
    DEV_MODE: "false"
    SYNC_ON_STARTUP: "true"
  migrations:
    enabled: true
    hook: pre-install,pre-upgrade
    backoffLimit: 3
    ttlSecondsAfterFinished: 600
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Vote Frontend configuration
voteFrontend:
  replicas: 1
  image:
    tag: v1.0.2
    pullPolicy: IfNotPresent

# Ingress configuration for production
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
  - host: vote.splat.top
    paths:
    - path: /api
      pathType: Prefix
      serviceName: api
      servicePort: 8000
    - path: /health
      pathType: Exact
      serviceName: api
      servicePort: 8000
    - path: /
      pathType: Prefix
      serviceName: frontend
      servicePort: 80
  tls:
    enabled: true
    secretName: vote-tls-secret
    certificate:
      enabled: true
