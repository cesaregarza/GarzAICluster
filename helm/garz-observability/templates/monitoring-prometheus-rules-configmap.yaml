{{- if and .Values.monitoring.prometheus.enabled .Values.monitoring.prometheus.rules.enabled }}
{{- $fullName := include "garzObservability.fullname" . -}}
{{- $rulesConfigMapName := default (printf "%s-prometheus-rules" $fullName) .Values.monitoring.prometheus.rules.configMapName -}}
{{- $agentControlPlane := .Values.monitoring.prometheus.agentControlPlane -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $rulesConfigMapName }}
  namespace: {{ include "garzObservability.monitoringNamespace" . }}
  labels:
    {{- include "garzObservability.componentLabels" (dict "component" "prometheus-rules" "root" .) | nindent 4 }}
data:
  cluster-mandate-alerts.yaml: |
    groups:
      - name: garzai-cluster-mandate-critical
        rules:
          - alert: PrometheusTSDBCapacityHigh
            expr: |
              max by (persistentvolumeclaim) (
                kubelet_volume_stats_used_bytes{namespace="monitoring", persistentvolumeclaim=~"prometheus-data.*"}
                  /
                kubelet_volume_stats_capacity_bytes{namespace="monitoring", persistentvolumeclaim=~"prometheus-data.*"}
              ) > 0.85
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: Prometheus TSDB nearing capacity
              description: PVC usage for Prometheus exceeded 85% for 15 minutes; consider scaling storage or reducing retention.

          - alert: AlertmanagerDown
            expr: sum(up{job="alertmanager"}) == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: Alertmanager is unreachable
              description: Prometheus could not scrape the Alertmanager endpoints for 5 minutes.

          - alert: MandateSyntheticLiveVerifyFailed
            expr: |
              max by (namespace, owner_name) (
                kube_job_status_failed{namespace="agent-control-plane"}
                  * on (namespace, job_name) group_left(owner_name)
                    kube_job_owner{
                      namespace="agent-control-plane",
                      owner_kind="CronJob",
                      owner_name="agent-control-plane-synthetic-live-verify"
                    }
              ) > 0
            for: 2m
            labels:
              severity: critical
              service: mandate
            annotations:
              summary: Mandate synthetic live verify failed
              description: The scheduled Mandate synthetic live verify CronJob has a failed Job; inspect the agent-control-plane synthetic-live-verify logs before the next deploy.

          - alert: GrafanaDown
            expr: sum(up{job="grafana"}) == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Grafana is unreachable
              description: Grafana metrics endpoint has been unreachable for 5 minutes.

      {{ if $agentControlPlane.enabled }}
      - name: mandate-agent-control-plane
        rules:
          # SLO: metrics observability. The control-plane API should emit one
          # scrapeable /metrics target continuously; missing samples for 5m
          # mean operators lose the live signal used by CES-108/CES-113.
          - alert: MandateAgentControlPlaneMetricsDown
            expr: |
              (
                sum(
                  up{
                    job="kubernetes-pods",
                    namespace={{ $agentControlPlane.namespace | quote }},
                    app_kubernetes_io_name={{ $agentControlPlane.serviceName | quote }},
                    app_kubernetes_io_component={{ $agentControlPlane.component | quote }}
                  }
                )
                or vector(0)
              ) == 0
            for: 5m
            labels:
              severity: critical
              service: mandate
              slo: metrics-observability
            annotations:
              summary: Mandate control-plane metrics are unreachable
              description: Prometheus has no healthy annotated scrape target for the Mandate API pod for 5 minutes. Check CES-113 pod annotations, monitoring egress, and API readiness.

          # SLO: callback delivery latency. Callback events should leave the
          # outbox quickly; no callback-adapter replica for 5m means delivery
          # cannot make progress.
          - alert: MandateCallbackAdapterDown
            expr: |
              (
                max(
                  kube_deployment_status_replicas_available{
                    namespace={{ $agentControlPlane.namespace | quote }},
                    deployment=~"{{ $agentControlPlane.serviceName }}-callback-adapter"
                  }
                )
                or vector(0)
              ) < {{ $agentControlPlane.alerts.callbackAdapterMinAvailableReplicas }}
            for: 5m
            labels:
              severity: critical
              service: mandate
              slo: callback-delivery-latency
            annotations:
              summary: Mandate callback adapter has no available replica
              description: The callback adapter deployment has fewer than {{ $agentControlPlane.alerts.callbackAdapterMinAvailableReplicas }} available replica for 5 minutes; callback delivery is stalled.

          # SLO: callback delivery latency. Warn when pending callback work
          # exceeds the configured backlog threshold for 10m.
          - alert: MandateCallbackOutboxBacklog
            expr: |
              max(
                mandate_callback_outbox_events_total{
                  namespace={{ $agentControlPlane.namespace | quote }}
                }
              ) > {{ $agentControlPlane.alerts.outboxDepthThreshold }}
            for: 10m
            labels:
              severity: warning
              service: mandate
              slo: callback-delivery-latency
            annotations:
              summary: Mandate callback outbox backlog is elevated
              description: Callback outbox rows exceeded {{ $agentControlPlane.alerts.outboxDepthThreshold }} for 10 minutes; the callback adapter may be stalled or downstream delivery may be failing.

          # SLO: time-to-claim. Ready jobs should be claimed within 5 minutes
          # at this scale; older ready jobs indicate dispatch or worker health
          # has regressed.
          - alert: MandateOldestReadyJobAgeHigh
            expr: |
              max(
                mandate_control_oldest_ready_job_age_seconds{
                  namespace={{ $agentControlPlane.namespace | quote }}
                }
              ) > {{ $agentControlPlane.alerts.oldestReadyJobAgeSecondsThreshold }}
            for: 10m
            labels:
              severity: warning
              service: mandate
              slo: time-to-claim
            annotations:
              summary: Mandate ready job age is high
              description: The oldest ready job has been ready for more than {{ $agentControlPlane.alerts.oldestReadyJobAgeSecondsThreshold }} seconds for 10 minutes; workers may be down, under-provisioned, or blocked by admission.

          # SLO: journey success rate. Dead-lettered callback delivery growth
          # means a released or failed terminal state did not reliably reach
          # the host surface.
          - alert: MandateDeadLetteredCallbackDeliveries
            expr: |
              (
                max_over_time(
                  mandate_callback_deliveries_by_status{
                    namespace={{ $agentControlPlane.namespace | quote }},
                    status="dead_lettered"
                  }[15m]
                )
                  -
                min_over_time(
                  mandate_callback_deliveries_by_status{
                    namespace={{ $agentControlPlane.namespace | quote }},
                    status="dead_lettered"
                  }[15m]
                )
              ) > {{ $agentControlPlane.alerts.deadLetteredDeliveryGrowthThreshold }}
            for: 0m
            labels:
              severity: critical
              service: mandate
              slo: journey-success-rate
            annotations:
              summary: Mandate callback deliveries are dead-lettering
              description: Dead-lettered callback deliveries increased over 15 minutes; released or failed terminal state delivery may be missing from the host channel.

          # SLO: journey success rate. Failed migrations can leave runtime code
          # and storage contracts incompatible before jobs can complete.
          - alert: MandateMigrationJobFailed
            expr: |
              max(
                kube_job_status_failed{
                  namespace={{ $agentControlPlane.namespace | quote }},
                  job_name=~"{{ $agentControlPlane.serviceName }}-migrate.*"
                }
              ) > 0
            for: 5m
            labels:
              severity: critical
              service: mandate
              slo: journey-success-rate
            annotations:
              summary: Mandate migration job failed
              description: A Mandate migration job in {{ $agentControlPlane.namespace }} reported failure for 5 minutes; stop promotion until the schema state is understood.
      {{ end }}

  splattop-app-alerts.yaml: |
    groups:
      - name: splattop-app-critical
        rules:
          - alert: FastAPIDown
            expr: sum(up{job="fastapi"}) == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: FastAPI service is unreachable
              description: Prometheus cannot scrape the FastAPI endpoints for 5 minutes.

          - alert: FastAPIFiveHundreds
            expr: |
              sum(rate(fastapi_requests_total{status=~"5.."}[5m]))
                /
              sum(rate(fastapi_requests_total[5m])) > 0.05
                and sum(rate(fastapi_requests_total[5m])) >= 1
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: Elevated 5xx error rate detected on FastAPI
              description: More than 5% of requests have failed with 5xx responses over the last 10 minutes.

          - alert: FastAPIHighLatencyP95
            expr: |
              histogram_quantile(0.95, sum by (le) (rate(fastapi_request_duration_seconds_bucket[5m]))) > 1
                and sum(rate(fastapi_requests_total[5m])) > 0.1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: FastAPI P95 latency above 1s
              description: 95th percentile request latency is above 1 second for 10 minutes.

          - alert: LookupSQLiteSnapshotStale
            expr: |
              time() - max(lookup_sqlite_snapshot_last_success_timestamp_seconds{kind="build"}) > 2700
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: Lookup SQLite snapshot is stale
              description: The lookup snapshot has not published a successful build for at least 45 minutes, so search and lookup-backed endpoints may drift stale.

          - alert: CompetitionPlayerSummaryLatencyHigh
            expr: |
              histogram_quantile(
                0.95,
                sum by (le) (
                  rate(
                    fastapi_request_duration_seconds_bucket{
                      path="/api/ripple/public/player/{player_id}/summary"
                    }[5m]
                  )
                )
              ) > 0.75
                and sum(
                  rate(
                    fastapi_requests_total{
                      path="/api/ripple/public/player/{player_id}/summary"
                    }[5m]
                  )
                ) > 0.05
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: Competition player summary latency is elevated
              description: The public competition player summary endpoint has sustained P95 latency above 750ms for 15 minutes.

          - alert: CeleryTaskFailures
            expr: |
              sum(rate(celery_task_failures_total[5m]))
                /
              clamp_min(sum(rate(celery_task_executions_total[5m])), 1) > 0.05
                and sum(rate(celery_task_executions_total[5m])) >= 0.5
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: Celery task failures detected
              description: Failure rate exceeded 5% with at least 0.5 tasks/sec over the last 10 minutes.

          - alert: CeleryWorkersStuck
            expr: max(celery_tasks_in_progress) > 25
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: Celery workers stuck processing tasks
              description: Over 25 Celery tasks remained in-flight for more than 15 minutes.

          - alert: APIUsageQueueBacklog
            expr: max(api_usage_queue_length) > 100
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: API usage queue backlog
              description: api_usage_queue_length exceeded 100 items for 15 minutes; batch flusher may be stalled.
{{- end }}
