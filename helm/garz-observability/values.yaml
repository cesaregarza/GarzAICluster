nameOverride: splattop
fullnameOverride: splattop-prod

# Preserve the live selector labels until CES-257 performs the explicit
# Prometheus/Grafana state-preservation cutover. Changing these labels would
# force immutable Deployment/StatefulSet selector changes.
legacySelectorLabels:
  name: splattop
  instance: splattop-prod

monitoring:
  namespace: monitoring
  createNamespace: true
  networkPolicies:
    defaultDeny:
      enabled: true
    acmeSolver:
      enabled: true
      ingressNamespace: ingress-nginx
    grafana:
      enabled: true
      allowedIngressNamespaces:
      - ingress-nginx
      - monitoring
      databaseCIDR: 10.108.0.0/20
      databasePort: 25060
      extraEgress: []
    prometheus:
      enabled: true
      allowedIngressNamespaces:
      - monitoring
      - ingress-nginx
      allowedEgressNamespaces:
      - monitoring
      - default
      - ingress-nginx
    alertmanager:
      enabled: true
      outboundCIDR: 0.0.0.0/0
      outboundPort: 443
  cilium:
    prometheusEgressKubeAPI:
      enabled: false

  # Prometheus configuration
  prometheus:
    enabled: false
    replicas: 1
    image:
      repository: prom/prometheus
      tag: v2.52.0
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 9090
      extraServices:
      - name: prometheus
        ports:
        - name: http
          port: 9090
          targetPort: http
    configMapName: prometheus-config
    retention: 15d
    persistence:
      enabled: true
      accessMode: ReadWriteOnce
      size: 20Gi
      storageClass: ""
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 2Gi
    rules:
      enabled: false
      configMapName: prometheus-rules

  # Grafana configuration
  grafana:
    enabled: false
    replicas: 1
    image:
      repository: grafana/grafana
      tag: 10.4.3
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 80
      extraServices:
      - name: grafana
        ports:
        - name: http
          port: 80
          targetPort: http
    adminUser: admin
    adminCredentialsSecret: grafana-admin-credentials
    adminCredentials:
      create: false
      username: admin
      password: admin
    serverDomain: ""
    serverRootUrl: ""
    plugins: []
    auth:
      anonymous: false
    metrics:
      enabled: true
    ingress:
      enabled: false
      nameOverride: ""
      className: nginx
      annotations: {}
      hosts: []
      tls:
        enabled: false
        secretName: grafana-tls
    vanityHosts: []
    #   - host: stats.grafana.splat.top
    #     target: https://grafana.splat.top/d/abc123/my-dashboard
    #     code: 302 # optional; defaults to 302
    #     tlsSecretName: grafana-tls # optional; defaults to the main Grafana TLS secret
    #     cloudflareProxied: true # optional; sets external-dns per-host proxy flag
    datasourcesConfigMapName: grafana-datasources
    dashboardProvidersConfigMapName: grafana-dashboard-providers
    dashboards:
    - name: core
      configMapName: grafana-dashboard-core
      dataKey: splattop-overview.json
    - name: splatgpt
      configMapName: grafana-dashboard-splatgpt
      dataKey: splatgpt-operations.json
    - name: auth-rate
      configMapName: grafana-dashboard-auth-rate
      dataKey: auth-and-rate.json
    - name: realtime
      configMapName: grafana-dashboard-realtime
      dataKey: realtime-channels.json
    - name: ripple
      configMapName: grafana-dashboard-ripple
      dataKey: ripple-performance.json
    - name: api-usage
      configMapName: grafana-dashboard-api-usage
      dataKey: api-usage-pipeline.json
    - name: data-pipeline
      configMapName: grafana-dashboard-data-pipeline
      dataKey: data-pipelines.json
    persistence:
      enabled: true
      accessMode: ReadWriteOnce
      size: 5Gi
      storageClass: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # AlertManager configuration
  alertmanager:
    enabled: false
    replicas: 1
    image:
      repository: prom/alertmanager
      tag: v0.27.0
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 9093
      extraServices:
      - name: alertmanager
        ports:
        - name: http
          port: 9093
          targetPort: http
    configSecret: alertmanager-config
    config:
      create: false
      content: |
        global:
          resolve_timeout: 5m

        route:
          receiver: dev-log

        receivers:
          - name: dev-log
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
