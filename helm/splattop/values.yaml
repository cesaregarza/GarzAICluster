# Default values for splattop.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global configuration
global:
  environment: development
  imagePullSecrets:
  - regcred
  databaseSecretName: db-secrets
  appImageTag: v2.0.2

# Cluster issuer (cert-manager) configuration
clusterIssuer:
  enabled: false
  name: letsencrypt-prod
  email: ""
  server: https://acme-v02.api.letsencrypt.org/directory
  privateKeySecretName: letsencrypt-prod
  ingressClass: nginx

# Database/application secret management
databaseSecret:
  create: false
  name: db-secrets
  type: Opaque
  stringData: {}

# FastAPI backend configuration
fastapi:
  enabled: true
  replicas: 1
  image:
    repository: registry.digitalocean.com/sendouq/fast-api
    tag: v2.0.30
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
    websocketPort: 8001
    extraServices:
    - name: fast-api-app-service
      ports:
      - name: http
        port: 8000
        targetPort: http
      - name: websocket
        port: 8001
        targetPort: websocket
  secretKeys:
  - RANKINGS_DB_NAME
  - RANKINGS_DB_SCHEMA
  - API_TOKEN_PEPPER
  - ADMIN_TOKEN_PEPPER
  - ADMIN_API_TOKENS_HASHED
  - DB_HOST
  - DB_USER
  - DB_PASSWORD
  - DB_NAME
  - DB_PORT
  env:
    COMP_LEADERBOARD_ENABLED: "true"
  resources: {}
  livenessProbe: {}
  readinessProbe: {}
  extraSecretEnv:
    - name: COMP_AUTH_ADMIN_DISCORD_IDS
      secretName: splattop-comp-auth-secrets
      key: COMP_AUTH_ADMIN_DISCORD_IDS
    - name: COMP_DISCORD_CLIENT_ID
      secretName: splattop-comp-auth-secrets
      key: COMP_DISCORD_CLIENT_ID
    - name: COMP_DISCORD_CLIENT_SECRET
      secretName: splattop-comp-auth-secrets
      key: COMP_DISCORD_CLIENT_SECRET
    - name: COMP_DISCORD_REDIRECT_URI
      secretName: splattop-comp-auth-secrets
      key: COMP_DISCORD_REDIRECT_URI
    - name: COMP_AUTH_SESSION_SECRET
      secretName: splattop-comp-auth-secrets
      key: COMP_AUTH_SESSION_SECRET

# React frontend configuration
react:
  enabled: true
  replicas: 1
  image:
    repository: registry.digitalocean.com/sendouq/react
    tag: v2.0.28
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    extraServices:
    - name: react-app-service
      ports:
      - name: http
        port: 80
        targetPort: http
  env:
    REACT_APP_SHOWCASE_STABLE_LEADERBOARD: "false"
  resources: {}
  livenessProbe: {}
  readinessProbe: {}

# Celery worker configuration
celeryWorker:
  enabled: true
  replicas: 1
  image:
    repository: registry.digitalocean.com/sendouq/celery
    tag: v2.0.30
    pullPolicy: Always
  command:
  - celery
  - -A
  - celery_app.app
  - worker
  - --loglevel=info
  secretKeys:
  - DB_HOST
  - DB_USER
  - DB_PASSWORD
  - DB_NAME
  - DB_PORT
  env:
    COMP_LEADERBOARD_ENABLED: "true"
  service:
    enabled: true
    type: ClusterIP
    port: 80
    extraServices:
    - name: celery-worker-service
      ports:
      - name: http
        port: 80
        targetPort: 8000
  resources: {}

# Celery beat configuration
celeryBeat:
  enabled: true
  replicas: 1
  image:
    repository: registry.digitalocean.com/sendouq/celery
    tag: v2.0.30
    pullPolicy: Always
  command:
  - celery
  args:
  - -A
  - celery_app.beat
  - beat
  - --loglevel=info
  secretKeys:
  - DB_HOST
  - DB_USER
  - DB_PASSWORD
  - DB_NAME
  - DB_PORT
  env:
    COMP_LEADERBOARD_ENABLED: "true"
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "20m"

warmupJob:
  enabled: true
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  commands:
  - celery -A celery_app.app call tasks.pull_data
  - celery -A celery_app.app call tasks.pull_aliases
  - celery -A celery_app.app call tasks.fetch_weapon_leaderboard
  - celery -A celery_app.app call tasks.fetch_season_results
  resources: {}

# Redis configuration
redis:
  enabled: true
  replicas: 1
  image:
    repository: redis
    tag: "7.2.4"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
    extraServices:
    - name: redis
      ports:
      - name: redis
        port: 6379
        targetPort: redis
  resources: {}

# SplatNLP/SplatGPT configuration
splatnlp:
  enabled: true
  replicas: 1
  image:
    repository: registry.digitalocean.com/sendouq/splatnlp
    tag: latest # allow-latest (upstream image publishes latest only)
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 9000
    extraServices:
    - name: splatnlp-service
      ports:
      - name: http
        port: 9000
        targetPort: http
  secretKeys:
  - DO_SPACES_ML_ENDPOINT
  - DO_SPACES_ML_DIR
  env: {}
  resources: {}

# Ingress configuration
ingress:
  enabled: false
  nameOverride: ""
  className: nginx
  annotations:
    nginx.org/websocket-services: '{{ include "splattop.fullname" . }}-fastapi'
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts: []
  # Example configuration (uncomment and modify for your needs):
  # hosts:
  #   - host: dev.splat.top
  #     paths:
  #       - path: /.well-known/
  #         pathType: Prefix
  #         serviceName: fastapi
  #         servicePort: 8000
  #       - path: /api
  #         pathType: Prefix
  #         serviceName: fastapi
  #         servicePort: 8000
  #       - path: /ws
  #         pathType: Prefix
  #         serviceName: fastapi
  #         servicePort: 8001
  #       - path: /
  #         pathType: Prefix
  #         serviceName: react
  #         servicePort: 80
  tls:
    enabled: false
    secretName: tls-secret
    certificate:
      enabled: false
      issuerName: letsencrypt-prod
      issuerKind: ClusterIssuer
      commonName: splat.top
      dnsNames:
      - splat.top
      - comp.splat.top

ingressController:
  enabled: false
  manifestPath: ingress-nginx/controller-v1.0.0.yaml

# Service account configuration
serviceAccount:
  create: false
  name: ""

# Override chart name
nameOverride: ""
fullnameOverride: ""
