kind: ConfigMap
metadata:
  name: {{ include "agent-workloads.opencodeProposerName" . }}-seed-bundle
  labels:
    {{- include "agent-workloads.opencodeProposerLabels" . | nindent 4 }}
binaryData:
  sandbox.bundle: {{ .Values.workspaceSeedBundle.base64 }}
{{- end }}
