{{- if .Values.opencodeProposer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-workloads.opencodeProposerName" . }}
  labels:
    {{- include "agent-workloads.opencodeProposerLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.opencodeProposer.replicaCount }}
  selector:
    matchLabels:
      {{- include "agent-workloads.opencodeProposerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent-workloads.opencodeProposerSelectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: opencode-proposer
        {{- with .Values.opencodeProposer.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.opencodeProposer.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "agent-workloads.serviceAccountName" . }}
      {{- include "agent-workloads.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if or .Values.opencodeProposer.initWorkspace.enabled (and .Values.opencodeApplyExecutor.enabled .Values.opencodeApplyExecutor.initWorkspace.enabled) }}
      initContainers:
        {{- if .Values.opencodeProposer.initWorkspace.enabled }}
        - name: init-workspace
          image: "{{ include "agent-workloads.imageRef" .Values.opencodeProposer.image }}"
          imagePullPolicy: {{ .Values.opencodeProposer.image.pullPolicy }}
          command:
            {{- toYaml .Values.opencodeProposer.initWorkspace.command | nindent 12 }}
          args:
            - {{ .Values.opencodeProposer.initWorkspace.script | quote }}
          env:
            - name: HOME
              value: /tmp
            - name: TMPDIR
              value: /tmp
          resources:
            {{- toYaml .Values.opencodeProposer.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: proposer-tmp
              mountPath: /tmp
            - name: job-workspace
              mountPath: /workspace/job
            - name: proposals
              mountPath: /workspace/proposals
            - name: workspace-seed
              mountPath: /workspace/seed
            {{- if .Values.workspaceSeedBundle.base64 }}
            - name: seed-bundle
              mountPath: /seed-bundle
              readOnly: true
            {{- end }}
        {{- end }}
        {{- if and .Values.opencodeApplyExecutor.enabled .Values.opencodeApplyExecutor.initWorkspace.enabled }}
        - name: init-apply-workspace
          image: "{{ include "agent-workloads.imageRef" .Values.opencodeApplyExecutor.image }}"
          imagePullPolicy: {{ .Values.opencodeApplyExecutor.image.pullPolicy }}
          command:
            {{- toYaml .Values.opencodeApplyExecutor.initWorkspace.command | nindent 12 }}
          args:
            - {{ .Values.opencodeApplyExecutor.initWorkspace.script | quote }}
          env:
            - name: HOME
              value: /tmp
            - name: TMPDIR
              value: /tmp
          resources:
            {{- toYaml .Values.opencodeApplyExecutor.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: apply-tmp
              mountPath: /tmp
            - name: apply-workspace
              mountPath: /workspace/job
            - name: proposals
              mountPath: /workspace/proposals
            - name: workspace-seed
              mountPath: /workspace/seed
            {{- if .Values.workspaceSeedBundle.base64 }}
            - name: seed-bundle
              mountPath: /seed-bundle
              readOnly: true
            {{- end }}
        {{- end }}
      {{- end }}
      containers:
        - name: opencode-proposer
          image: "{{ include "agent-workloads.imageRef" .Values.opencodeProposer.image }}"
          imagePullPolicy: {{ .Values.opencodeProposer.image.pullPolicy }}
          command:
            {{- toYaml .Values.opencodeProposer.command | nindent 12 }}
          {{- with .Values.opencodeProposer.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- include "agent-workloads.envFromValues" (dict "root" . "values" .Values.opencodeProposer) | nindent 12 }}
          resources:
            {{- toYaml .Values.opencodeProposer.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: proposer-tmp
              mountPath: /tmp
            - name: job-workspace
              mountPath: /workspace/job
            - name: proposals
              mountPath: /workspace/proposals
            - name: workspace-seed
              mountPath: /workspace/seed
              readOnly: true
        {{- if .Values.opencodeApplyExecutor.enabled }}
        - name: opencode-apply-executor
          image: "{{ include "agent-workloads.imageRef" .Values.opencodeApplyExecutor.image }}"
          imagePullPolicy: {{ .Values.opencodeApplyExecutor.image.pullPolicy }}
          command:
            {{- toYaml .Values.opencodeApplyExecutor.command | nindent 12 }}
          {{- with .Values.opencodeApplyExecutor.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- include "agent-workloads.envFromValues" (dict "root" . "values" .Values.opencodeApplyExecutor) | nindent 12 }}
          resources:
            {{- toYaml .Values.opencodeApplyExecutor.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: apply-tmp
              mountPath: /tmp
            - name: apply-workspace
              mountPath: /workspace/job
            - name: proposals
              mountPath: /workspace/proposals
            - name: workspace-seed
              mountPath: /workspace/seed
              readOnly: true
        {{- end }}
      volumes:
        - name: proposer-tmp
          emptyDir: {}
        - name: apply-tmp
          emptyDir: {}
        - name: job-workspace
          emptyDir: {}
        - name: apply-workspace
          emptyDir: {}
        - name: proposals
          emptyDir: {}
        - name: workspace-seed
          emptyDir:
            sizeLimit: 8Mi
        {{- if .Values.workspaceSeedBundle.base64 }}
        - name: seed-bundle
          configMap:
            name: {{ include "agent-workloads.opencodeProposerName" . }}-seed-bundle
        {{- end }}
{{- end }}
