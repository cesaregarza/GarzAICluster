{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agent-workloads.fullname" . }}
  labels:
    {{- include "agent-workloads.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agent-workloads.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    {{- if .Values.networkPolicy.egress.dns.enabled }}
    - to:
        {{- toYaml .Values.networkPolicy.egress.dns.destinations | nindent 8 }}
      ports:
        {{- toYaml .Values.networkPolicy.egress.dns.ports | nindent 8 }}
    {{- end }}
    {{- range .Values.networkPolicy.egress.destinations }}
    - to:
        {{- list (omit . "ports") | toYaml | nindent 8 }}
      {{- with .ports }}
      ports:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
