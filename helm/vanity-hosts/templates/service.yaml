apiVersion: v1
kind: Service
metadata:
  name: {{ include "vanity-hosts.fullname" . }}
  labels:
    {{- include "vanity-hosts.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "vanity-hosts.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: 80
