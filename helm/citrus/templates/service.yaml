apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  labels:
    {{- include "citrus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: citrus-web
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
