apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "citrus.fullname" . }}
  labels:
    {{- include "citrus.labels" . | nindent 4 }}
    app: citrus-web
spec:
  strategy:
    type: Recreate
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: citrus-web
  template:
    metadata:
      labels:
        app: citrus-web
    spec:
      {{- include "citrus.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: django
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (printf "v%s" .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          command: ["sh", "-c"]
          args:
            - {{ .Values.application.command | quote }}
          envFrom:
            - configMapRef:
                name: {{ .Values.application.configMapName }}
            - secretRef:
                name: {{ .Values.application.secretName }}
                optional: true
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.targetPort }}
              {{- if .Values.healthCheck.hostHeader }}
              httpHeaders:
                - name: Host
                  value: {{ .Values.healthCheck.hostHeader | quote }}
              {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.targetPort }}
              {{- if .Values.healthCheck.hostHeader }}
              httpHeaders:
                - name: Host
                  value: {{ .Values.healthCheck.hostHeader | quote }}
              {{- end }}
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
          volumeMounts:
            - name: media-volume
              mountPath: {{ .Values.persistence.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: media-volume
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.name }}
