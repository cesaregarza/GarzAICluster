global:
  imagePullSecrets:
    - regcred

replicaCount: 1

image:
  repository: registry.digitalocean.com/sendouq/garz-ai
  tag: v0.1.0
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - justflip.garz.ai
    - habit-taper.garz.ai
  tls:
    enabled: true
    secretName: justflip-garz-ai-tls
    certificate:
      enabled: true
      issuerName: letsencrypt-prod
      dnsNames: []

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi
