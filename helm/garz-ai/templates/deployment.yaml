apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "garz-ai.fullname" . }}
  labels:
    {{- include "garz-ai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "garz-ai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "garz-ai.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "garz-ai.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (printf "v%s" .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
