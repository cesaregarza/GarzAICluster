{{- if and .Values.ingress.enabled .Values.ingress.tls.enabled .Values.ingress.tls.certificate.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "splattop-blog.fullname" . }}-cert
  labels:
    {{- include "splattop-blog.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.ingress.tls.secretName }}
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    {{- range .Values.ingress.tls.certificate.dnsNames }}
    - {{ . }}
    {{- end }}
{{- end }}
