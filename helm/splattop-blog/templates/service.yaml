{{- if .Values.blog.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "splattop-blog.fullname" . }}
  labels:
    {{- include "splattop-blog.labels" . | nindent 4 }}
spec:
  type: {{ .Values.blog.service.type }}
  ports:
    - port: {{ .Values.blog.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "splattop-blog.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: blog
{{- end }}
