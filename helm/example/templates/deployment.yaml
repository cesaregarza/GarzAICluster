apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "discord-bot.fullname" . }}
  labels: {{- include "discord-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 2
  selector:
    matchLabels: {{- include "discord-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "discord-bot.selectorLabels" . | nindent 8 }}
      {{- if .Values.metrics.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.metrics.port }}"
        prometheus.io/path: "{{ .Values.metrics.path | default "/metrics" }}"
      {{- end }}
    spec:
      serviceAccountName: {{ include "discord-bot.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: bot
          image: "{{- if .Values.image.repository -}}{{ .Values.image.repository }}{{- if .Values.image.digest }}@{{ .Values.image.digest }}{{- else if .Values.image.tag }}:{{ .Values.image.tag }}{{- end }}{{- end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          env:
          {{- range $k, $v := .Values.env }}
            - name: {{ $k | quote }}
              value: {{ $v | quote }}
          {{- end }}
          {{- range .Values.extraEnv }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
          {{- end }}
          envFrom:
          {{- range .Values.secretRefs }}
            - secretRef:
                name: {{ .name }}
          {{- end }}
          ports:
            - name: {{ .Values.metrics.portName | default "metrics" }}
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- if .Values.health.enabled }}
            - name: {{ .Values.health.portName | default "http" }}
              containerPort: {{ .Values.health.port | default 8080 }}
              protocol: TCP
            {{- end }}
          {{- if .Values.health.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.health.livenessPath | default "/healthz" }}
              port: {{ .Values.health.portName | default "http" }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.health.readinessPath | default "/readyz" }}
              port: {{ .Values.health.portName | default "http" }}
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
