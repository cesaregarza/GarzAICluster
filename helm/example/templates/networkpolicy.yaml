{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "discord-bot.fullname" . }}
  labels: {{- include "discord-bot.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "discord-bot.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress","Egress"]
  ingress: []
  egress:
    {{- if .Values.networkPolicy.allowDNS }}
    - ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    {{- end }}
    {{- if .Values.networkPolicy.allowHTTPS }}
    - ports:
        - { protocol: TCP, port: 443 }
    {{- end }}
{{- end }}
