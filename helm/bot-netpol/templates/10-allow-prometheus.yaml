{{- if .Values.permissions.prometheus }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-prometheus
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: ["prometheus"]
      ports:
        - protocol: TCP
          port: 9090
{{- end }}
