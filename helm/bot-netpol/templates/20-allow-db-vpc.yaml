{{- if .Values.permissions.dbReadOnlyVPC }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-readonly-db-vpc
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: "10.108.0.0/20"
      ports:
        - protocol: TCP
          port: 25060
{{- end }}
