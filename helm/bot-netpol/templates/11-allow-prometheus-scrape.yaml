{{- if .Values.permissions.prometheus }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["prometheus"]
      ports:
        - protocol: TCP
          port: {{ .Values.metricsPort | default 9464 }}
{{- end }}
