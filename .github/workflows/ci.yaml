name: Config Repo CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  helm-and-kubeconform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - name: splattop
            path: helm/splattop
            release: splattop
            prod_values: helm/splattop/values-prod.yaml
          - name: splattop-teams
            path: helm/splattop-teams
            release: splattop-teams
            prod_values: helm/splattop-teams/values-prod.yaml
          - name: skyquiet-server
            path: helm/skyquiet-server
            release: skyquiet-server
            prod_values: helm/skyquiet-server/values.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Helm lint
        run: helm lint "${{ matrix.chart.path }}"

      - name: Render manifests (default + prod)
        run: |
          mkdir -p rendered
          helm template "${{ matrix.chart.release }}" "${{ matrix.chart.path }}" > "rendered/${{ matrix.chart.name }}-default.yaml"
          helm template "${{ matrix.chart.release }}" "${{ matrix.chart.path }}" -f "${{ matrix.chart.prod_values }}" > "rendered/${{ matrix.chart.name }}-prod.yaml"

      - name: Run kubeconform
        run: |
          set -euo pipefail
          for file in rendered/*.yaml; do
            echo "Validating ${file}"
            kubeconform \
              -schema-location default \
              -skip CiliumNetworkPolicy,Certificate \
              -strict -summary -exit-on-error "$file"
          done

      - name: Upload rendered manifests (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manifests-${{ matrix.chart.name }}
          path: rendered

  prometheus-rules:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env:
          - name: prod
            values: helm/splattop/values-prod.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run promtool validation
        run: python scripts/validate_prometheus_config.py --values ${{ matrix.env.values }} --label ${{ matrix.env.name }}
