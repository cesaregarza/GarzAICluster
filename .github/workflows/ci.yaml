name: Config Repo CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  python-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Check grant ownership map
        run: uv run python scripts/generate_grant_ownership.py --check

      - name: Run Python contract tests
        run: uv run python -m unittest discover -s tests

      - name: Check control-plane release pin
        run: uv run python scripts/check_control_plane_release_pin.py

  agent-workloads-identity-digest-drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Install sops
        run: |
          set -euo pipefail
          curl --fail --location --retry 5 --retry-all-errors --connect-timeout 20 \
            --output /tmp/sops \
            https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          sops --version

      - name: Fetch drift-gate SOPS age key
        id: drift-gate-broker
        uses: cesaregarza/.github/actions/fetch-broker-credentials@main
        with:
          broker-url: https://credentials.garz.ai
          audience: https://credentials.garz.ai/v1
          capability: sops-drift-gate-decrypt
          export-env: true

      - name: Check agent-workloads identity digest drift
        env:
          SOPS_AGE_KEY: ${{ env.SOPS_DRIFT_GATE_AGE_KEY }}
        run: uv run python scripts/check_agent_workloads_identity_digests.py

  agent-control-plane-deployed-registry-compat:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install config repo dependencies
        run: uv sync

      - name: Read pinned agent-platform revision
        id: mandate-revision
        run: |
          set -euo pipefail
          revision="$(uv run python scripts/check_agent_control_plane_registry_compat.py --print-target-revision)"
          echo "revision=${revision}" >> "$GITHUB_OUTPUT"

      - name: Fetch Mandate read token
        id: broker
        uses: cesaregarza/.github/actions/fetch-broker-credentials@main
        with:
          broker-url: https://credentials.garz.ai
          audience: https://credentials.garz.ai/v1
          capability: mandate-contracts-read

      - name: Check out pinned agent-platform source
        uses: actions/checkout@v4
        with:
          repository: cesaregarza/agent-platform
          ref: ${{ steps.mandate-revision.outputs.revision }}
          path: agent-platform
          token: ${{ fromJson(steps.broker.outputs.secrets-json).MANDATE_CONTRACTS_READ_TOKEN }}

      - name: Install pinned agent-platform
        run: uv pip install -e agent-platform

      - name: Check deployed registry compatibility
        run: >-
          uv run python scripts/check_agent_control_plane_registry_compat.py
          --agent-platform-repo agent-platform

  helm-and-kubeconform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - name: splattop
            path: helm/splattop
            release: splattop
            prod_values: helm/splattop/values-prod.yaml
          - name: splattop-teams
            path: helm/splattop-teams
            release: splattop-teams
            prod_values: helm/splattop-teams/values-prod.yaml
          - name: skyquiet-server
            path: helm/skyquiet-server
            release: skyquiet-server
            prod_values: helm/skyquiet-server/values.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Install kubeconform
        run: |
          curl --fail --location --retry 5 --retry-all-errors --connect-timeout 20 \
            --output kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          gzip -t kubeconform.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Helm lint
        run: helm lint "${{ matrix.chart.path }}"

      - name: Render manifests (default + prod)
        run: |
          mkdir -p rendered
          helm template "${{ matrix.chart.release }}" "${{ matrix.chart.path }}" > "rendered/${{ matrix.chart.name }}-default.yaml"
          helm template "${{ matrix.chart.release }}" "${{ matrix.chart.path }}" -f "${{ matrix.chart.prod_values }}" > "rendered/${{ matrix.chart.name }}-prod.yaml"

      - name: Run kubeconform
        run: |
          set -euo pipefail
          for file in rendered/*.yaml; do
            echo "Validating ${file}"
            kubeconform \
              -schema-location default \
              -skip CiliumNetworkPolicy,Certificate \
              -strict -summary -exit-on-error "$file"
          done

      - name: Upload rendered manifests (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manifests-${{ matrix.chart.name }}
          path: rendered

  prometheus-rules:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env:
          - name: prod
            values: helm/splattop/values-prod.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run promtool validation
        run: python scripts/validate_prometheus_config.py --values ${{ matrix.env.values }} --label ${{ matrix.env.name }}
