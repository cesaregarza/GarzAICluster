name: deny-plaintext-secrets

on:
  pull_request:
    paths:
      - 'secrets/**'
      - 'k8s/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if secrets exist unencrypted
        run: |
          set -euo pipefail
          files=$(git ls-files 'secrets/**/*.y*ml' 'k8s/**/*secret*.y*ml' 2>/dev/null || true)
          if [ -z "$files" ]; then
            exit 0
          fi

          bad=""
          for file in $files; do
            # Skip files that are expected templates/examples
            if [[ "$file" =~ \.template ]]; then
              continue
            fi
            if ! grep -q '^sops:' "$file"; then
              bad+="$file\n"
            fi
          done

          if [ -n "$bad" ]; then
            echo "::error ::Found unencrypted secret manifests:\n$bad"
            exit 1
          fi
