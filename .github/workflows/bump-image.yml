name: bump-image

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: bump-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
      reason: ${{ steps.auth.outputs.reason }}
      command: ${{ steps.auth.outputs.command }}
    steps:
      - id: auth
        uses: actions/github-script@v7
        with:
          script: |
            if (!context.payload.issue || context.payload.issue.pull_request) {
              core.setOutput('allowed', 'false');
              core.setOutput('reason', 'Not an issue comment');
              core.setOutput('command', 'false');
              return;
            }

            const body = (context.payload.comment?.body || '').trim();
            const isCommand = /^\/(?:bump|approve)\b/i.test(body);
            core.setOutput('command', String(isCommand));
            if (!isCommand) {
              core.setOutput('allowed', 'false');
              core.setOutput('reason', 'No slash command');
              return;
            }

            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });

            const allowed = ['admin', 'maintain', 'write'].includes(data.permission);
            if (!allowed) {
              core.setOutput('allowed', 'false');
              core.setOutput('reason', `insufficient (${data.permission})`);
              return;
            }

            core.setOutput('allowed', 'true');
            core.setOutput('reason', data.permission);

  comment-on-deny:
    needs: gate
    if: needs.gate.outputs.allowed == 'false' && needs.gate.outputs.command == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain denial
        uses: actions/github-script@v7
        with:
          script: |
            const reason = '${{ needs.gate.outputs.reason }}' || 'Access denied';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Sorry, I can't run that bump: ${reason}.`,
            });

  detect-intent:
    needs: gate
    if: needs.gate.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    outputs:
      bot: ${{ steps.parse.outputs.bot }}
      mode: ${{ steps.parse.outputs.mode }}
      value: ${{ steps.parse.outputs.value }}
      trigger: ${{ steps.parse.outputs.trigger }}
      paused: ${{ steps.parse.outputs.paused }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue form or slash command
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment?.body || "";
            const issueBody = context.payload.issue?.body || "";
            let out = { bot: "", mode: "", value: "", trigger: "", paused: "false" };

            const get = (hdr) => {
              const re = new RegExp(`###\\s+${hdr}\\s*[\\r\\n]+([\\s\\S]*?)(?=\\n###|$)`);
              const m = issueBody.match(re);
              return m ? m[1].trim() : '';
            };

            const hasPause = (txt) => /\bpause\b/i.test(txt || '');

            if (/^\/bump\b/i.test(body)) {
              const tail = body.replace(/^\/bump\b/i, '').trim();
              const parts = tail.split(/\s+/).filter(Boolean);
              if (parts.length < 2) {
                core.setFailed('Usage: /bump <bot> <tag|digest>');
                return;
              }
              const bot = parts.shift();
              const valueRaw = parts.join(' ').trim();
              const cleaned = valueRaw.replace(/^digest=/i, '').trim();
              const paused = hasPause(cleaned);
              out.bot = bot;
              out.mode = paused ? 'pause' : (cleaned.startsWith('sha256:') ? 'digest' : 'tag');
              out.value = cleaned;
              out.trigger = 'comment';
              out.paused = String(paused);
              core.setOutput('bot', out.bot);
              core.setOutput('mode', out.mode);
              core.setOutput('value', out.value);
              core.setOutput('trigger', out.trigger);
              core.setOutput('paused', out.paused);
              return;
            }

            if (/^\/approve\b/i.test(body)) {
              const bot = get('Which bot\\?');
              const modeField = get('How are you specifying the new version\\?');
              const mode = /pause/i.test(modeField) ? 'pause' : (/digest/.test(modeField) ? 'digest' : 'tag');
              const value = get("Tag, Digest, or 'pause'");
              if (!bot || !value) {
                core.setFailed('Issue form is missing bot or value.');
                return;
              }
              const cleaned = value.replace(/^digest=/i, '').trim();
              const paused = mode === 'pause' || hasPause(cleaned);
              const resolvedMode = paused ? 'pause' : (mode || (cleaned.startsWith('sha256:') ? 'digest' : 'tag'));
              core.setOutput('bot', bot);
              core.setOutput('mode', resolvedMode);
              core.setOutput('value', cleaned);
              core.setOutput('trigger', 'approval');
              core.setOutput('paused', String(paused));
              return;
            }

            core.setFailed('Unrecognized command.');

  resolve-and-verify:
    needs: detect-intent
    runs-on: ubuntu-latest
    environment: config
    permissions:
      id-token: write
      contents: read
    outputs:
      bot: ${{ steps.out.outputs.bot }}
      image: ${{ steps.out.outputs.image }}
      digest: ${{ steps.out.outputs.digest }}
      tag: ${{ steps.out.outputs.tag }}
      paused: ${{ steps.out.outputs.paused }}
    steps:
      - uses: actions/checkout@v4

      - name: Install crane
        run: |
          curl -sSL -o /tmp/go-containerregistry.tar.gz https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz
          sudo tar -C /usr/local/bin -xzf /tmp/go-containerregistry.tar.gz crane

      - name: Fetch DOCR credentials from broker
        id: docr-creds
        uses: cesaregarza/.github/actions/fetch-broker-credentials@main
        with:
          broker-url: https://credentials.garz.ai
          audience: https://credentials.garz.ai/v1
          capability: digitalocean-registry-write

      - name: Authenticate to DigitalOcean Registry
        env:
          DIGITALOCEAN_REGISTRY_TOKEN: ${{ fromJson(steps.docr-creds.outputs.secrets-json).DIGITALOCEAN_REGISTRY_TOKEN }}
        run: |
          if [ -z "$DIGITALOCEAN_REGISTRY_TOKEN" ]; then
            echo "DIGITALOCEAN_REGISTRY_TOKEN is required to query image digests" >&2
            exit 1
          fi
          echo "$DIGITALOCEAN_REGISTRY_TOKEN" | crane auth login registry.digitalocean.com -u doctl --password-stdin

      - name: Install yq
        run: |
          sudo curl -sSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read bot config
        id: cfg
        run: |
          BOT="${{ needs.detect-intent.outputs.bot }}"
          VAL='${{ needs.detect-intent.outputs.value }}'

          if [ -z "$BOT" ]; then
            echo "No bot detected" >&2
            exit 1
          fi

          IMG=$(yq -r ".bots[\"$BOT\"].image" bots.yaml)
          if [ -z "$IMG" ] || [ "$IMG" = "null" ]; then
            echo "Unknown bot: $BOT" >&2
            exit 1
          fi

          FILE=$(yq -r ".bots[\"$BOT\"].valuesFile" bots.yaml)
          if [ -z "$FILE" ] || [ "$FILE" = "null" ]; then
            echo "Bot $BOT missing valuesFile" >&2
            exit 1
          fi
          if [ ! -f "$FILE" ]; then
            echo "Values file $FILE not found" >&2
            exit 1
          fi

          echo "bot=$BOT" >> "$GITHUB_OUTPUT"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"
          echo "raw=$VAL" >> "$GITHUB_OUTPUT"
          echo "values_file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Resolve tag -> digest (or accept digest)
        id: digest
        run: |
          RAW='${{ steps.cfg.outputs.raw }}'
          IMG='${{ steps.cfg.outputs.image }}'
          PAUSED='${{ needs.detect-intent.outputs.paused }}'
          VALUES_FILE='${{ steps.cfg.outputs.values_file }}'

          TAG_OUT=""
          if [ "$PAUSED" = "true" ]; then
            DIGEST=$(yq -r '.image.digest // ""' "$VALUES_FILE")
            TAG_OUT=$(yq -r '.image.tag // ""' "$VALUES_FILE")
            if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
              echo "Pause requested but $VALUES_FILE is missing image.digest" >&2
              exit 1
            fi
            echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG_OUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$RAW" | grep -q '^sha256:'; then
            DIGEST="$RAW"
          else
            TAG_OUT="$RAW"
            DIGEST=$(crane digest "$IMG:$TAG_OUT")
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_OUT" >> "$GITHUB_OUTPUT"

      - name: Optional cosign verification
        id: cosign
        run: |
          set -euo pipefail
          BOT='${{ steps.cfg.outputs.bot }}'
          if [ -n "$BOT" ]; then
            REQUIRED=$(yq -r ".bots[\"$BOT\"].cosign.required" bots.yaml)
            if [ "$REQUIRED" = "true" ]; then
              curl -sSfL https://raw.githubusercontent.com/sigstore/cosign/main/install.sh | sudo sh -s -- -d -b /usr/local/bin
              ISSUER=$(yq -r ".bots[\"$BOT\"].cosign.issuer" bots.yaml)
              IDRE=$(yq -r ".bots[\"$BOT\"].cosign.identity_regexp" bots.yaml)
              cosign verify "${{ steps.cfg.outputs.image }}@${{ steps.digest.outputs.digest }}" \
                --certificate-oidc-issuer "$ISSUER" \
                --certificate-identity-regexp "$IDRE"
            fi
          fi

      - name: Capture outputs
        id: out
        run: |
          echo "bot=${{ steps.cfg.outputs.bot }}" >> "$GITHUB_OUTPUT"
          echo "image=${{ steps.cfg.outputs.image }}" >> "$GITHUB_OUTPUT"
          echo "digest=${{ steps.digest.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "tag=${{ steps.digest.outputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "paused=${{ needs.detect-intent.outputs.paused }}" >> "$GITHUB_OUTPUT"
          echo "values_file=${{ steps.cfg.outputs.values_file }}" >> "$GITHUB_OUTPUT"

  patch-and-pr:
    needs: resolve-and-verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo curl -sSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Apply patch
        run: |
          chmod +x scripts/patch-image.sh
          scripts/patch-image.sh "${{ needs.resolve-and-verify.outputs.bot }}" \
            "${{ needs.resolve-and-verify.outputs.image }}" \
            "${{ needs.resolve-and-verify.outputs.digest }}" \
            "${{ needs.resolve-and-verify.outputs.tag }}" \
            "${{ needs.resolve-and-verify.outputs.paused }}"

      - name: Commit and push branch
        id: push
        env:
          BOT: ${{ needs.resolve-and-verify.outputs.bot }}
          IMAGE: ${{ needs.resolve-and-verify.outputs.image }}
          DIGEST: ${{ needs.resolve-and-verify.outputs.digest }}
        run: |
          set -euo pipefail
          BRANCH="bump/${BOT}-${GITHUB_RUN_ID}"
          if git diff --quiet; then
            echo "No changes to commit"
            echo "branch=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(${BOT}): pin ${IMAGE} -> ${DIGEST}" --signoff
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open PR (or reuse existing)
        if: steps.push.outputs.branch != ''
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.push.outputs.branch }}';
            const bot = '${{ needs.resolve-and-verify.outputs.bot }}';
            const image = '${{ needs.resolve-and-verify.outputs.image }}';
            const digest = '${{ needs.resolve-and-verify.outputs.digest }}';
            const paused = '${{ needs.resolve-and-verify.outputs.paused }}' === 'true';
            const base = 'main';
            const title = `bot(${bot}): pin ${image} -> ${digest}`;
            const body = [
              `Requested by @${context.actor} via ${{ needs.detect-intent.outputs.trigger }}.`,
              '',
              `Pinned image: \`${image}@${digest}\``,
              paused ? 'Replica count set to 0 (paused).' : 'Replica count set to 1.',
              `Branch: \`${branch}\``,
            ].join('\n');

            try {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: branch,
                base,
                title,
                body,
                maintainer_can_modify: true,
              });
              core.setOutput('pr_url', pr.html_url);
              core.setOutput('pr_number', pr.number);
              core.setOutput('pr_created', 'true');
            } catch (error) {
              if (error.status === 422 && /already exists/i.test(error.message)) {
                const { data: prs } = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  head: `${context.repo.owner}:${branch}`,
                  state: 'open',
                });
                if (prs.length) {
                  const pr = prs[0];
                  core.setOutput('pr_url', pr.html_url);
                  core.setOutput('pr_number', pr.number);
                  core.setOutput('pr_created', 'false');
                  return;
                }
              }
              throw error;
            }

      - name: Comment with branch details
        if: steps.push.outputs.branch != ''
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.push.outputs.branch }}
          IMAGE: ${{ needs.resolve-and-verify.outputs.image }}
          DIGEST: ${{ needs.resolve-and-verify.outputs.digest }}
          TRIGGER: ${{ needs.detect-intent.outputs.trigger }}
          PAUSED: ${{ needs.resolve-and-verify.outputs.paused }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        with:
          script: |
            const branch = process.env.BRANCH;
            const image = process.env.IMAGE;
            const digest = process.env.DIGEST;
            const trigger = process.env.TRIGGER;
            const paused = (process.env.PAUSED || '').toLowerCase() === 'true';
            const actor = context.actor;
            const prUrl = process.env.PR_URL || '';
            const prNumber = process.env.PR_NUMBER || '';
            const replicaLine = paused ? 'Replica count set to 0 (paused).' : 'Replica count set to 1.';

            const body = [
              `Requested by @${actor} via ${trigger}.`,
              '',
              `Pinned image: \`${image}@${digest}\``,
              replicaLine,
              `Branch: \`${branch}\``,
              prUrl ? `PR: #${prNumber} (${prUrl})` : 'PR: not created automatically.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  comment-on-failure:
    needs: [gate, detect-intent, resolve-and-verify, patch-and-pr]
    if: >
      always() && needs.gate.outputs.command == 'true' && (
        needs.gate.result == 'failure' ||
        needs.detect-intent.result == 'failure' ||
        needs.resolve-and-verify.result == 'failure' ||
        needs.patch-and-pr.result == 'failure'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Comment with failure details
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue?.number || context.payload.issue?.number;
            if (!issueNumber) {
              core.warning('No issue number available to comment on.');
              return;
            }
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Bump workflow run failed. Please check logs: ${runUrl}`,
            });
